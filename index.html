<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>持仓守护签</title>
    <style>
      :root {
        --bg: #f5f5dc;
        --red: #b22222;
        --gold: #d4af37;
        --ink: #2a1c16;
        --paper: rgba(255, 253, 243, 0.72);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Noto Serif SC", "STKaiti", "KaiTi", serif;
        background:
          radial-gradient(1200px 800px at 20% 18%, rgba(212, 175, 55, 0.14), transparent 52%),
          radial-gradient(900px 700px at 85% 78%, rgba(178, 34, 34, 0.14), transparent 55%),
          repeating-linear-gradient(135deg, rgba(0, 0, 0, 0.02) 0 2px, rgba(255, 255, 255, 0.04) 2px 6px),
          repeating-linear-gradient(0deg, rgba(178, 34, 34, 0.035) 0 1px, transparent 1px 7px),
          var(--bg);
      }

      #app { min-height: 100vh; }

      .page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 22px 16px; }

      .panel {
        width: min(94vw, 460px);
        border: 1px solid rgba(212, 175, 55, 0.9);
        border-radius: 20px;
        background:
          linear-gradient(180deg, rgba(255, 253, 243, 0.74), rgba(245, 245, 220, 0.62));
        box-shadow:
          0 18px 40px rgba(42, 28, 22, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.55);
        padding: 22px 20px 18px;
        position: relative;
        overflow: hidden;
      }

      .panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 25% 20%, rgba(212, 175, 55, 0.08), transparent 45%),
          radial-gradient(circle at 75% 70%, rgba(178, 34, 34, 0.06), transparent 42%),
          repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.012) 0 1px, transparent 1px 6px);
        pointer-events: none;
      }

      .title {
        text-align: center;
        margin: 0 0 10px;
        color: var(--red);
        letter-spacing: 0.2em;
        font-weight: 700;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
        position: relative;
        z-index: 1;
      }

      .subtitle { margin: 0 0 18px; text-align: center; color: rgba(178, 34, 34, 0.82); font-size: 14px; position: relative; z-index: 1; }
      .loading-fortune {
        margin: -6px 0 14px;
        text-align: center;
        color: rgba(178, 34, 34, 0.88);
        font-size: 14px;
        letter-spacing: 0.08em;
      }

      .tube-wrap { height: 310px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }

      .tube-aura {
        position: absolute;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.14), rgba(212, 175, 55, 0.04) 48%, transparent 72%);
        filter: blur(0.8px);
        pointer-events: none;
      }

      .tube {
        width: 148px;
        height: 222px;
        border-radius: 74px / 30px;
        position: relative;
        background: linear-gradient(90deg, #b22222 0%, #b22222 78%, #9a1b1b 100%);
        border: 1px solid rgba(212, 175, 55, 0.76);
        box-shadow:
          inset -10px 0 14px rgba(58, 6, 6, 0.25),
          0 26px 34px rgba(42, 10, 10, 0.38),
          0 8px 18px rgba(212, 175, 55, 0.1);
      }

      .tube::before {
        content: "";
        position: absolute;
        top: -14px;
        left: 6px;
        right: 6px;
        height: 26px;
        border-radius: 70px / 18px;
        border: 2px solid rgba(212, 175, 55, 0.86);
        background: #8f1616;
        box-shadow: inset 0 -6px 8px rgba(0, 0, 0, 0.22);
      }

      .tube-mark {
        position: absolute;
        left: 50%;
        top: 56%;
        width: 62px;
        height: 62px;
        margin-left: -31px;
        margin-top: -31px;
        transform: rotate(45deg);
        border-radius: 4px;
        border: 1px solid rgba(180, 130, 0, 0.45);
        background: #ffd700;
        box-shadow: 0 8px 14px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 250, 210, 0.5);
        z-index: 3;
      }

      .tube-mark-text {
        position: absolute;
        inset: 0;
        transform: rotate(-45deg);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #b22222;
        font-size: 36px;
        font-weight: 800;
        font-family: "KaiTi", "STKaiti", serif;
        letter-spacing: 0;
      }

      .sticks-top {
        position: absolute;
        top: -54px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: 6px;
      }
      .stick-top {
        width: 14px;
        height: 72px;
        border-radius: 4px;
        position: relative;
        background: linear-gradient(180deg, #b22222 0 36%, #d8b56d 36% 100%);
        border: 1px solid rgba(123, 90, 7, 0.55);
        box-shadow:
          0 5px 8px rgba(0, 0, 0, 0.22),
          inset 0 1px 0 rgba(255,255,255,.2);
        clip-path: polygon(50% 0, 100% 13%, 100% 100%, 0 100%, 0 13%);
      }
      .stick-top::before {
        content: "";
        position: absolute;
        top: 10px;
        left: 50%;
        width: 6px;
        height: 6px;
        margin-left: -3px;
        border-radius: 50%;
        background: #ffd700;
        box-shadow: 0 0 0 1px rgba(146, 102, 0, 0.45);
      }

      .flying-stick {
        position: absolute;
        width: 15px;
        height: 128px;
        border-radius: 8px;
        background: linear-gradient(90deg, #fff2c8, #e2c46b 45%, #b48b2e);
        border: 1px solid rgba(133, 101, 13, 0.55);
        left: 50%;
        margin-left: -7.5px;
        top: 76px;
        box-shadow:
          0 10px 18px rgba(0, 0, 0, 0.22),
          0 0 0 rgba(212, 175, 55, 0);
      }

      .stick-glow {
        position: absolute;
        left: 50%;
        top: 90px;
        width: 160px;
        height: 160px;
        margin-left: -80px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(212, 175, 55, 0.25), transparent 62%);
        filter: blur(0.2px);
        pointer-events: none;
      }

      .primary-btn {
        width: 100%;
        border: 1px solid rgba(212, 175, 55, 0.95);
        border-radius: 999px;
        padding: 14px 18px;
        color: rgba(255, 246, 212, 0.98);
        font-size: 16px;
        letter-spacing: 0.12em;
        cursor: pointer;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent),
          linear-gradient(90deg, #7b1010, #b22222 48%, #7b1010);
        box-shadow: 0 10px 18px rgba(146, 22, 22, 0.22);
      }
      .primary-btn:disabled { opacity: 0.74; cursor: not-allowed; }
      .secondary-btn {
        width: 100%;
        margin-top: 8px;
        border: 1px solid rgba(212, 175, 55, 0.72);
        border-radius: 999px;
        padding: 10px 16px;
        color: rgba(178, 34, 34, 0.9);
        font-size: 14px;
        cursor: pointer;
        background: rgba(255, 253, 243, 0.75);
      }
      .ghost-btn {
        width: 100%;
        margin-top: 8px;
        border: 1px dashed rgba(212, 175, 55, 0.55);
        border-radius: 999px;
        padding: 10px 16px;
        color: rgba(178, 34, 34, 0.78);
        font-size: 13px;
        cursor: pointer;
        background: rgba(245, 245, 220, 0.35);
      }
      .music-btn {
        width: 100%;
        margin-top: 8px;
        border: 1px solid rgba(212, 175, 55, 0.72);
        border-radius: 999px;
        padding: 10px 16px;
        color: rgba(178, 34, 34, 0.9);
        font-size: 13px;
        cursor: pointer;
        background: rgba(255, 253, 243, 0.75);
      }

      .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; position: relative; z-index: 1; }
      .qa {
        border-radius: 14px;
        padding: 10px 10px;
        border: 1px solid rgba(212, 175, 55, 0.55);
        background:
          radial-gradient(circle at 20% 25%, rgba(212, 175, 55, 0.08), transparent 55%),
          rgba(255, 253, 243, 0.62);
        color: rgba(178, 34, 34, 0.86);
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        letter-spacing: 0.06em;
      }
      .qa b { color: rgba(212, 175, 55, 0.95); font-weight: 700; }

      /* Result scroll */
      .scroll {
        position: relative;
        border-radius: 16px;
        border: 1px solid rgba(212, 175, 55, 0.78);
        background:
          radial-gradient(circle at 30% 30%, rgba(0, 0, 0, 0.03), transparent 55%),
          repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.015) 0 1px, transparent 1px 7px),
          rgba(255, 253, 243, 0.72);
        padding: 14px 12px 16px;
        overflow: hidden;
      }
      .rod { height: 14px; border-radius: 999px; background: linear-gradient(90deg, #b48b2e, #d4af37 40%, #f0e1a0 55%, #d4af37 70%, #b48b2e); box-shadow: 0 6px 12px rgba(0,0,0,.14); }
      .rod.top { margin-bottom: 10px; }
      .rod.bottom { margin-top: 10px; }

      .result-sign { margin: 0 0 8px; text-align: center; color: var(--red); font-weight: 800; font-size: 22px; letter-spacing: 0.08em; }
      .action-title { margin: 2px 0 10px; text-align: center; color: rgba(178, 34, 34, 0.92); font-weight: 700; font-size: 18px; letter-spacing: 0.06em; }

      .fortune-text {
        max-height: 290px;
        overflow: auto;
        margin: 0 auto;
        padding: 12px 12px;
        border-left: 1px solid rgba(212, 175, 55, 0.45);
        border-right: 1px solid rgba(212, 175, 55, 0.45);
        border-radius: 12px;
        background:
          radial-gradient(circle at 30% 25%, rgba(212, 175, 55, 0.10), transparent 58%),
          rgba(245, 245, 220, 0.55);
        font-size: 18px;
        line-height: 1.9;
        letter-spacing: 0.02em;
        color: rgba(178, 34, 34, 0.9);
        text-align: left;
      }

      .tip { margin: 10px 0 0; text-align: center; font-size: 12px; color: rgba(129, 95, 56, 0.92); position: relative; z-index: 1; }

      /* Opening gates */
      .gate-stage {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #2b0b0b;
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      .gate-glow {
        position: absolute;
        inset: -20%;
        background: radial-gradient(circle at 50% 50%, rgba(212,175,55,.25), transparent 55%);
        opacity: 0;
        pointer-events: none;
      }
      .gate-doors {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .door {
        position: relative;
        background:
          radial-gradient(circle at 20% 30%, rgba(0,0,0,.28), transparent 55%),
          repeating-linear-gradient(90deg, rgba(0,0,0,.12) 0 2px, rgba(255,255,255,.03) 2px 6px),
          linear-gradient(180deg, #7b1010, #b22222 35%, #8d1414 70%, #6e0d0d);
        border-right: 1px solid rgba(212,175,55,.35);
        border-left: 1px solid rgba(212,175,55,.35);
        box-shadow: inset 0 0 80px rgba(0,0,0,.35);
      }
      .door::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 40% 30%, rgba(212,175,55,.09), transparent 58%),
          radial-gradient(circle at 65% 70%, rgba(0,0,0,.15), transparent 55%);
        opacity: 0.75;
      }
      .bolt {
        position: absolute;
        left: 50%;
        top: 52%;
        width: 220px;
        height: 22px;
        margin-left: -110px;
        border-radius: 999px;
        background: linear-gradient(90deg, #b48b2e, #d4af37 35%, #f0e1a0 55%, #d4af37 75%, #b48b2e);
        box-shadow: 0 18px 40px rgba(0,0,0,.35);
      }
      .ring {
        position: absolute;
        left: 50%;
        top: calc(52% - 30px);
        width: 76px;
        height: 76px;
        margin-left: -38px;
        border-radius: 999px;
        border: 6px solid rgba(212,175,55,.92);
        box-shadow:
          inset 0 0 0 6px rgba(0,0,0,.2),
          0 10px 30px rgba(0,0,0,.35);
        background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.25), transparent 52%);
      }
      .gate-hint {
        position: relative;
        z-index: 2;
        margin-top: 64vh;
        color: rgba(245,245,220,.9);
        font-size: 13px;
        letter-spacing: 0.18em;
        text-align: center;
        user-select: none;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import React, { useEffect, useMemo, useRef, useState } from "https://esm.sh/react@18.3.1";
      import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
      import { AnimatePresence, motion } from "https://esm.sh/framer-motion@11.3.19";

      const STORE_KEY="daily-fuqian-result";
      const GATE_KEY="daily-gate-opened";
      const GATE_AUDIO_SRC = "./开场动画音效.MP3";
      const DRAW_AUDIO_SRC = "./抽签音效.MP3";
      const BGM_AUDIO_SRC = "./bgm.MP3";
      const AUDIO_ENABLED = false;
      const FALLBACK_DATA = {
        luckGrades: ["财富上上签", "暴富特签", "聚财中吉签", "吸金上吉签", "特签"],
        actions: [
          { name: "今日宜品茗", text: "一盏清茶，洗去浮尘，让思绪在茶香中缓缓沉淀。", action: "今日宜品茗！", url: "https://content.jr.jd.com/jrq/?jrcontainer=h5&jrlogin=false&utm_term=wxfriends&utm_source=iOS_url_1778038568590&utm_medium=jrappshare#/group?id=2689640" },
          { name: "今日宜联系老友", text: "岁月如歌，一声问候抵过千言万语，温暖彼此的心房。", action: "今日宜联系老友！", url: "https://content.jr.jd.com/jrq/?jrcontainer=h5&jrlogin=false&utm_term=wxfriends&utm_source=iOS_url_1778038568590&utm_medium=jrappshare#/group?id=2689640" },
          { name: "今日宜整理", text: "收纳杂物，也梳理心情，让空间与头脑一同回归有序。", action: "今日宜整理！", url: "https://content.jr.jd.com/jrq/?jrcontainer=h5&jrlogin=false&utm_term=wxfriends&utm_source=iOS_url_1778038568590&utm_medium=jrappshare#/group?id=2689640" },
          { name: "今日宜散步", text: "慢行于街巷或林间，用脚步丈量平凡日子里的微小确幸。", action: "今日宜散步！", url: "https://content.jr.jd.com/jrq/?jrcontainer=h5&jrlogin=false&utm_term=wxfriends&utm_source=iOS_url_1778038568590&utm_medium=jrappshare#/group?id=2689640" },
          { name: "今日宜阅读", text: "翻开一本书，与智者对话，在字里行间寻得片刻安宁。", action: "今日宜阅读！", url: "https://content.jr.jd.com/jrq/?jrcontainer=h5&jrlogin=false&utm_term=wxfriends&utm_source=iOS_url_1778038568590&utm_medium=jrappshare#/group?id=2689640" },
          { name: "今日宜冥想", text: "闭目静坐，倾听呼吸的节奏，让纷扰随吐纳渐渐消散。", action: "今日宜冥想！", url: "https://content.jr.jd.com/jrq/?jrcontainer=h5&jrlogin=false&utm_term=wxfriends&utm_source=iOS_url_1778038568590&utm_medium=jrappshare#/group?id=2689640" },
          { name: "今日宜书写", text: "提笔落下三两心事，把情绪的折痕熨烫成平实的文字。", action: "今日宜书写！", url: "https://content.jr.jd.com/jrq/?jrcontainer=h5&jrlogin=false&utm_term=wxfriends&utm_source=iOS_url_1778038568590&utm_medium=jrappshare#/group?id=2689640" },
          { name: "今日宜烹饪", text: "洗切炖炒，用一餐饭的温度，喂养身体也疗愈灵魂。", action: "今日宜烹饪！", url: "https://content.jr.jd.com/jrq/?jrcontainer=h5&jrlogin=false&utm_term=wxfriends&utm_source=iOS_url_1778038568590&utm_medium=jrappshare#/group?id=2689640" },
          { name: "今日宜断舍离", text: "舍弃无用之物，放下执念与负担，轻装迎接新的流动。", action: "今日宜断舍离！", url: "https://content.jr.jd.com/jrq/?jrcontainer=h5&jrlogin=false&utm_term=wxfriends&utm_source=iOS_url_1778038568590&utm_medium=jrappshare#/group?id=2689640" },
          { name: "今日宜早睡", text: "合上窗帘，对星辰道一声晚安，让睡眠修复疲惫的身心。", action: "今日宜早睡！", url: "https://content.jr.jd.com/jrq/?jrcontainer=h5&jrlogin=false&utm_term=wxfriends&utm_source=iOS_url_1778038568590&utm_medium=jrappshare#/group?id=2689640" },
          { name: "今日宜关注", text: "关注一位社区牛人，从\"长期主义\"中汲取从容力量！", action: "今日宜关注！", url: "https://roma.jd.com/content/personal?contentId=jimu_user_info-167626" },
          { name: "今日宜阅读", text: "阅读社区文章，用智慧武装头脑，给理财之道增砖添瓦！", action: "今日宜阅读", url: "https://content.jr.jd.com/article/index.html?pageId=731445076" },
          { name: "今日宜逛圈", text: "来社区\"基金圈”逛逛，寻找共鸣伙伴、投资同路人。", action: "今日宜逛圈", url: "https://content.jr.jd.com/jrq/?jrcontainer=h5&jrlogin=false&utm_term=wxfriends&utm_source=iOS_url_1778038568590&utm_medium=jrappshare#/group?id=2689640" },
          { name: "今日宜点赞", text: "每一次市场的起伏都是成长的机会。关注今日行情，为坚持点赞。", action: "今日宜点赞", url: "https://content.jr.jd.com/article/index.html?pageId=720330878" },
          { name: "今日宜发帖", text: "分享是快乐的倍增器，将你的投资感悟传递给更多人！", action: "今日宜发帖", url: "https://content.jr.jd.com/jrq/?#/group?id=2689640" }
        ]
      };
      const dateTag=()=>{const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`};
      const pickOne=(a)=>a[Math.floor(Math.random()*a.length)];
      const makeResult=(data)=>({day:dateTag(),sign:pickOne(data.luckGrades),action:pickOne(data.actions)});
      const readSaved=()=>{try{const v=JSON.parse(localStorage.getItem(STORE_KEY)||"null");return v&&v.day===dateTag()?v:null}catch{return null}};
      const writeSaved=(r)=>localStorage.setItem(STORE_KEY,JSON.stringify(r));
      let sharedAudioCtx = null;
      let masterGainNode = null;
      let bgmStarted = false;
      let noiseBufferCache = null;

      const getAudioCtx=()=>{
        const Ctx=window.AudioContext||window.webkitAudioContext;
        if(!Ctx) return null;
        if(!sharedAudioCtx) sharedAudioCtx = new Ctx();
        return sharedAudioCtx;
      };

      const ensureAudioUnlocked=async()=>{
        if(!AUDIO_ENABLED) return null;
        const ctx=getAudioCtx();
        if(!ctx) return null;
        if(ctx.state==="suspended"){
          try { await ctx.resume(); } catch {}
        }
        if(!masterGainNode){
          masterGainNode = ctx.createGain();
          masterGainNode.gain.value = 0.18;
          masterGainNode.connect(ctx.destination);
        }
        return ctx;
      };

      const getNoiseBuffer=(ctx)=>{
        if(noiseBufferCache) return noiseBufferCache;
        const buffer = ctx.createBuffer(1, ctx.sampleRate * 1.5, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for(let i=0;i<data.length;i++) data[i] = (Math.random() * 2 - 1) * 0.75;
        noiseBufferCache = buffer;
        return buffer;
      };

      const startBgm=()=>{
        if(!AUDIO_ENABLED) return;
        const ctx=getAudioCtx();
        if(!ctx || !masterGainNode || bgmStarted || ctx.state==="suspended") return;
        bgmStarted = true;

        // warm ambient pad
        const o1 = ctx.createOscillator();
        const o2 = ctx.createOscillator();
        const g = ctx.createGain();
        const lfo = ctx.createOscillator();
        const lfoGain = ctx.createGain();

        o1.type = "sine";
        o2.type = "triangle";
        o1.frequency.value = 196;
        o2.frequency.value = 293.66;
        g.gain.value = 0.001;

        lfo.type = "sine";
        lfo.frequency.value = 0.12;
        lfoGain.gain.value = 0.015;
        lfo.connect(lfoGain);
        lfoGain.connect(g.gain);

        o1.connect(g);
        o2.connect(g);
        g.connect(masterGainNode);

        g.gain.setValueAtTime(0.001, ctx.currentTime);
        g.gain.linearRampToValueAtTime(0.045, ctx.currentTime + 2.4);

        o1.start();
        o2.start();
        lfo.start();
      };

      const playGateOpenSound=()=>{
        if(!AUDIO_ENABLED) return;
        const ctx=getAudioCtx();
        if(!ctx || !masterGainNode || ctx.state==="suspended") return;

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(140, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 1.3);
